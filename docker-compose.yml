services:
  postgres:
    image: postgres:16-alpine
    container_name: mykiz-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-mykiz}
      POSTGRES_USER: ${DB_USER:-mykiz}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mykiz_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mykiz}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mykiz-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-mykiz_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-mykiz_minio_secret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: mykiz-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set mykiz http://minio:9000 $${MINIO_ACCESS_KEY:-mykiz_minio} $${MINIO_SECRET_KEY:-mykiz_minio_secret};
      mc mb --ignore-existing mykiz/$${MINIO_BUCKET_NAME:-mykiz-uploads};
      mc anonymous set download mykiz/$${MINIO_BUCKET_NAME:-mykiz-uploads};
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
