  postgres: ^3.1.0
  minio_new: ^1.0.2
  dotenv: ^4.2.0
  uuid: ^4.2.1

dev_dependencies:
  build_runner: ^2.4.0
  test: ^1.24.0
  glados: ^1.1.1
  mocktail: ^1.0.0
