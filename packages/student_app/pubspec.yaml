version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  api_client:
    path: ../api_client
  shared_core:
    path: ../shared_core
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.9
  go_router: ^13.0.0
